#--------------------------------------------------------------------
#       Locale
#--------------------------------------------------------------------
quarkus.default-locale=it-IT
#--------------------------------------------------------------------
#				OpenAPI and Swagger
#--------------------------------------------------------------------
%dev.quarkus.smallrye-openapi.info-title=Warehouse Logistic Optimizer
%dev.quarkus.smallrye-openapi.info-version=1.0.0
%dev.quarkus.swagger-ui.doc-expansion=none
%dev.quarkus.smallrye-openapi.path=/docs/v1/openapi
%dev.quarkus.smallrye-openapi.operation-id-strategy=method
%dev.quarkus.swagger-ui.path=/ui/v1/openapi
%dev.quarkus.swagger-ui.display-operation-id=true
%dev.quarkus.swagger-ui.always-include=true

#--------------------------------------------------------------------
#				Health
#--------------------------------------------------------------------
quarkus.smallrye-health.root-path=/api/v1/health
quarkus.smallrye-health.ui.root-path=/ui/v1/health

#--------------------------------------------------------------------
#				Server properties
#--------------------------------------------------------------------
quarkus.http.root-path=api/v1/warehouse-logistics
quarkus.http.port=8090
quarkus.http.test-port=8091

#--------------------------------------------------------------------
#               DB config
#--------------------------------------------------------------------
quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/warehouse_optimization?currentSchema=dev
%dev.quarkus.datasource.username=warehouse
%dev.quarkus.datasource.password=optimization

#--------------------------------------------------------------------
#               Flyway Migration
#--------------------------------------------------------------------
quarkus.flyway.locations=dbinit/postgres
quarkus.flyway.enabled=true
quarkus.flyway.migrate-at-start=true
quarkus.flyway.ignore-missing-migrations=false

%dev.quarkus.flyway.enabled=true
%dev.quarkus.flyway.migrate-at-start=true
%dev.quarkus.flyway.ignore-missing-migrations=false


#--------------------------------------------------------------------
#				CORS
#--------------------------------------------------------------------
%dev.quarkus.http.cors=true
%dev.quarkus.http.cors.access-control-allow-credentials=true
%dev.quarkus.http.cors.origins=/.*/
%dev.quarkus.http.cors.headers=Authorization,Access-Control-Allow-Origin,Content-Type,Response-Type
quarkus.http.cors=true
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.headers=Authorization,Access-Control-Allow-Origin,Content-Type,Response-Type

#--------------------------------------------------------------------
#				GRAPHHOPPER
#--------------------------------------------------------------------

warehouse.coordinates.validation.enabled =true
warehouse.lat.min=35.0
warehouse.lat.max=48.5
warehouse.lon.min=6.0
warehouse.lon.max=19.0
warehouse.routing.language=it

warehouse.map.auto-download=true
warehouse.map.connection-timeout=2
warehouse.map.file-path=data
warehouse.map.file-name=italy-latest.osm.pbf
warehouse.map.country=italy
warehouse.map.continent=europe

