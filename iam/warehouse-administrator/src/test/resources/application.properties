#--------------------------------------------------------------------
#              TEST APPLICATION PROPERTIES
#--------------------------------------------------------------------

quarkus.oidc.enabled=true
quarkus.oidc.auth-server-url=http://localhost:9999/realms/fake
quarkus.oidc.client-id=fake
quarkus.oidc.credentials.secret=fake

#--------------------------------------------------------------------
#               DB config
#--------------------------------------------------------------------
%test.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/warehouse_administrator?currentSchema=test,public
%test.quarkus.datasource.username=warehouse_admin
%test.quarkus.datasource.password=warehouse_admin


#--------------------------------------------------------------------
#               Flyway Migration
#--------------------------------------------------------------------
%test.quarkus.flyway.locations=dbinit/postgres
%test.quarkus.flyway.migrate-at-start=true
%test.quarkus.flyway.ignore-missing-migrations=false
%test.quarkus.flyway.enabled=true
%test.quarkus.flyway.schemas=test
%test.quarkus.flyway.clean-at-start=true
